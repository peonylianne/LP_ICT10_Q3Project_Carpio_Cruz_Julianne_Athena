<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up Page</title>

<style>
    body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(135deg, #dbeafe, #f0f9ff);
        margin: 0;
        padding-top: 80px;
    }

    /* NAVBAR */
    .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        background: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 40px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        z-index: 1000;
    }

    .nav-title {
        font-size: 18px;
        font-weight: bold;
        color: #1e3a8a;
    }

    .nav-links {
        list-style: none;
        display: flex;
        gap: 30px;
        margin: 0;
        padding: 0;
    }

    .nav-links a {
        text-decoration: none;
        font-weight: 600;
        color: #334155;
        transition: 0.3s;
    }

    .nav-links a:hover {
        color: #2563eb;
    }

    .container {
        display: flex;
        justify-content: center;
    }

    .card {
        background: white;
        padding: 35px;
        width: 450px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        border-top: 6px solid #3b82f6;
        text-align: center;
    }

    h1 {
        color: #1e3a8a;
        margin-bottom: 20px;
    }

    .input-group {
        text-align: left;
        margin: 18px 0;
    }

    .input-group label {
        font-weight: 600;
        color: #334155;
    }

    input, select {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        font-size: 15px;
        box-sizing: border-box;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        color: white;
        background: linear-gradient(to right, #ef4444, #f59e0b, #22c55e, #3b82f6);
        cursor: pointer;
        margin-top: 25px;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
        transform: scale(1.03);
        box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    .note {
        margin-top: 15px;
        font-size: 13px;
        color: #64748b;
    }
</style>
</head>

<body>

<nav class="navbar">
    <div class="nav-title">Intramurals SY 2025-2026</div>
    <ul class="nav-links">
        <li><a href="index.html">Sign Up Page</a></li>
        <li><a href="TeamCheck.html">Team Checker</a></li>
        <li><a href="listofplayers.html">List of Players</a></li>
    </ul>
</nav>


<div class="container">
<div class="card">
    <h1>Player Registration</h1>

    <div class="input-group">
        <label>Full Name:</label>
        <input type="text" placeholder="Enter your full name">
    </div>

    <div class="input-group">
        <label>Student ID:</label>
        <input type="text" placeholder="Enter your student ID">
    </div>

    <div class="input-group">
        <label>Grade:</label>
        <select>
            <option>7</option>
            <option>8</option>
            <option>9</option>
            <option>10</option>
        </select>
    </div>

    <div class="input-group">
        <label>Section:</label>
        <select>
            <option>Ruby</option>
            <option>Topaz</option>
            <option>Sapphire</option>
            <option>Emerald</option>
        </select>
    </div>

    <div class="input-group">
        <label>Gender:</label>
        <select>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
    </div>

    <button onclick="window.location.href='TeamCheck.html'">
        Submit Registration
    </button>

    <p class="note">Please ensure all information is correct before submitting.</p>
</div>
</div>

</body>
</html>
