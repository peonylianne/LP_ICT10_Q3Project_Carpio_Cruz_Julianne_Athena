 <style>
	
	 body {

        text-align: center;
    }

    /* NAVBAR */
    .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        background: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 40px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        z-index: 1000;
    }

    .nav-title {
        font-size: 18px;
        font-weight: bold;
        color: #1e3a8a;
    }

    .nav-links {
        list-style: none;
        display: flex;
        gap: 30px;
        margin: 0;
        padding: 0;
    }

    .nav-links a {
        text-decoration: none;
        font-weight: 600;
        color: #334155;
        transition: 0.3s;
    }

    .nav-links a:hover {
        color: #2563eb;
    }

	.container {
		background-color: white;
        border: solid 5px white;
        border-radius: 15px;
        width: 950px;
        margin-top: 100px;
        box-shadow: #0077b6;
	}

    .card {
        background: white;
        padding: 35px;
        width: 450px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        border-top: 6px solid #3b82f6;
        text-align: center;
    }

    h1 {
        color: #1e3a8a;
        margin-bottom: 20px;
        text-align: center;
    }

    .input-group {
        text-align: left;
        margin: 18px 0;
    }

    .input-group label {
        font-weight: 600;
        color: #334155;
    }

    input, select {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        font-size: 15px;
        box-sizing: border-box;
    }

    button {
        width: 70%;
        height: 20%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        color: white;
        background: linear-gradient(to right, #ef4444, #f59e0b, #22c55e, #3b82f6);
        cursor: pointer;
        margin-top: 25px;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
        transform: scale(1.03);
        box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    .note {
        margin-top: 15px;
        font-size: 13px;
        color: #64748b;
    }
